<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>FieldPro OS SaaS - Firebase</title>
  <link rel="manifest" id="manifestLink">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-storage-compat.js"></script>
  <style>
    :root{--brand:#020617;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--glass:rgba(255,255,255,.86);--line:rgba(148,163,184,.32)}
    *{box-sizing:border-box} body{background:radial-gradient(circle at top left,rgba(56,189,248,.18),transparent 34%),radial-gradient(circle at top right,rgba(37,99,235,.16),transparent 32%),linear-gradient(135deg,#eef6ff 0%,#f8fafc 45%,#edf7ff 100%);color:#0f172a;min-height:100vh} .hidden{display:none!important}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(15,23,42,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(15,23,42,.035) 1px,transparent 1px);background-size:42px 42px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.55),transparent 70%)}
    .card{border-radius:24px;box-shadow:0 22px 70px rgba(15,23,42,.12);background:var(--glass);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.72)}.btn{transition:.2s}.btn:hover{transform:translateY(-1px);filter:brightness(1.04);box-shadow:0 12px 28px rgba(37,99,235,.18)}
    input,select,textarea{outline:none;background:rgba(255,255,255,.9)!important;border-color:#dbeafe!important;transition:.2s} input:focus,select:focus,textarea:focus{border-color:#38bdf8!important;box-shadow:0 0 0 4px rgba(56,189,248,.16)}.tab-active{background:linear-gradient(135deg,#2563eb,#06b6d4)!important;color:#fff!important;box-shadow:0 18px 40px rgba(37,99,235,.24)!important}.tab{border:1px solid rgba(148,163,184,.22)!important}.sig{touch-action:none;background:#fff;border:1px solid #cbd5e1;border-radius:14px;width:100%;height:180px}
    header.no-print{background:linear-gradient(135deg,#020617,#0f172a 45%,#082f49)!important;border-bottom:1px solid rgba(56,189,248,.22)}
    table{border-collapse:separate;border-spacing:0} thead tr{background:linear-gradient(135deg,#eef6ff,#f8fafc)!important} tr:hover{background:rgba(56,189,248,.06)}
    .status-dot{width:10px;height:10px;border-radius:9999px;display:inline-block;margin-right:6px}.soft-kpi{position:relative;overflow:hidden}.soft-kpi:after{content:"";position:absolute;right:-30px;top:-30px;width:100px;height:100px;border-radius:999px;background:rgba(255,255,255,.16)}

    /* ERP MicroSaaS Pro Layer */
    :root{--erp-primary:#2563eb;--erp-cyan:#06b6d4;--erp-dark:#020617;--erp-panel:rgba(255,255,255,.82)}
    #app main{max-width:1500px!important;padding:18px!important}
    #menu{position:sticky;top:78px;z-index:20;padding:10px;border:1px solid rgba(148,163,184,.24);border-radius:28px;background:rgba(255,255,255,.64);backdrop-filter:blur(18px);box-shadow:0 18px 45px rgba(15,23,42,.08)}
    #menu .tab{background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(248,250,252,.76))!important;border-radius:18px!important;box-shadow:0 10px 28px rgba(15,23,42,.06)!important;color:#0f172a;letter-spacing:.01em}
    .module>.card,.module form.card{border:1px solid rgba(148,163,184,.24)!important;box-shadow:0 24px 80px rgba(2,6,23,.10)!important}
    .erp-title{font-size:1.35rem;font-weight:900;letter-spacing:-.025em;background:linear-gradient(135deg,#0f172a,#2563eb 65%,#06b6d4);-webkit-background-clip:text;color:transparent}
    .erp-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.erp-btn{background:linear-gradient(135deg,#2563eb,#06b6d4);color:#fff;border-radius:14px;padding:10px 14px;font-weight:900;box-shadow:0 14px 30px rgba(37,99,235,.18)}
    .erp-btn-dark{background:linear-gradient(135deg,#020617,#1e293b);color:#fff;border-radius:14px;padding:10px 14px;font-weight:900}.erp-btn-green{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border-radius:14px;padding:10px 14px;font-weight:900}
    .erp-chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    table th{font-size:12px;text-transform:uppercase;letter-spacing:.045em;color:#475569} table td{vertical-align:top} .table-pro table{min-width:760px}

    @media print{.no-print{display:none!important} body{background:#fff}.card{box-shadow:none;background:#fff;border:0} body:before{display:none}}
  </style>
</head>
<body>
<div id="loginScreen" class="min-h-screen bg-gradient-to-br from-slate-950 via-blue-950 to-slate-900 flex items-center justify-center p-4">
  <div class="card w-full max-w-md p-7">
    <div class="text-center mb-5">
      <div class="mx-auto w-16 h-16 rounded-2xl bg-blue-700 text-white flex items-center justify-center text-3xl font-black">OS</div>
      <h1 class="text-2xl font-black mt-4">FieldPro OS SaaS</h1>
      <p class="text-sm text-slate-500">Firebase Auth + Realtime Database + Storage</p>
    </div>
    <div id="firebaseAlert" class="hidden bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl text-sm mb-3"></div>
    <label class="text-sm font-bold">E-mail</label>
    <input id="email" type="email" class="w-full border rounded-xl px-4 py-3 mb-3" placeholder="admin@empresa.com" />
    <label class="text-sm font-bold">Senha</label>
    <input id="senha" type="password" class="w-full border rounded-xl px-4 py-3 mb-4" placeholder="Sua senha" />
    <button onclick="login()" class="btn w-full bg-blue-700 text-white rounded-xl py-3 font-black">Entrar</button>
    <button onclick="resetPassword()" class="btn w-full mt-2 bg-slate-100 rounded-xl py-3 font-bold">Recuperar senha</button>
    <p class="text-xs text-slate-500 mt-4">Primeiro acesso: crie o usuário no Firebase Authentication e cadastre o perfil em /users no Realtime Database.</p>
  </div>
</div>

<div id="app" class="hidden">
  <header class="no-print sticky top-0 z-30 bg-slate-950 text-white shadow-xl">
    <div class="max-w-7xl mx-auto p-3 flex flex-wrap justify-between gap-3 items-center">
      <div><h2 class="font-black text-lg" id="companyTitle">FieldPro OS</h2><p id="userInfo" class="text-xs text-blue-200"></p></div>
      <div class="flex gap-2 flex-wrap"><span id="onlineStatus" class="px-3 py-2 rounded-lg bg-slate-800 text-xs font-bold">ONLINE</span><button onclick="installPWA()" class="btn bg-emerald-600 px-3 py-2 rounded-lg font-bold text-sm">Instalar App</button><button onclick="logout()" class="btn bg-red-600 px-3 py-2 rounded-lg font-bold text-sm">Sair</button></div>
    </div>
  </header>
  <main class="max-w-7xl mx-auto p-4">
    <nav id="menu" class="no-print grid grid-cols-2 md:grid-cols-5 lg:grid-cols-10 gap-2 mb-4"></nav>
    <section id="dashboard" class="module"></section>
    <section id="os" class="module hidden"></section>
    <section id="clientes" class="module hidden"></section>
    <section id="tecnicos" class="module hidden"></section>
    <section id="estoque" class="module hidden"></section>
    <section id="servicos" class="module hidden"></section>
    <section id="agenda" class="module hidden"></section>
    <section id="financeiro" class="module hidden"></section>
    <section id="cobrancas" class="module hidden"></section>
    <section id="fiscal" class="module hidden"></section>
    <section id="rh" class="module hidden"></section>
    <section id="relatorios" class="module hidden"></section>
    <section id="statusos" class="module hidden"></section>
    <section id="config" class="module hidden"></section>
  </main>
</div>

<script>
'use strict';

/* COLE AQUI O SEU FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAt2TnAniXroOM3azPGV_V_E7aRppHe8ck",
  authDomain: "systemseg.firebaseapp.com",
  databaseURL: "https://systemseg-default-rtdb.firebaseio.com",
  projectId: "systemseg",
  storageBucket: "systemseg.firebasestorage.app",
  messagingSenderId: "944347398449",
  appId: "1:944347398449:web:cca015078ceadf8e89b010",
  measurementId: "G-1KEH3RN3HV"
};

let app, auth, rtdb, storage, currentUser=null, profile=null, dataRef=null, locationWatchId=null, selectedStatusOsId=null, state={users:{},clientes:{},tecnicos:{},ordens:{},estoque:{},financeiro:{},cobrancas:{},fiscal:{},servicos:{},agenda:{},locationHistory:{},technicianLive:{},company:{nome:'FieldPro OS',logo:''}};
let charts=[], deferredPrompt=null, signaturePad={drawing:false, canvas:null, ctx:null};

function init(){
  setupPWA();
  window.addEventListener('online',()=>setOnline(true));
  window.addEventListener('offline',()=>setOnline(false));
  window.addEventListener('error',e=>showFirebaseError('Erro no sistema: '+(e.message||'erro desconhecido')));
  window.addEventListener('unhandledrejection',e=>showFirebaseError('Erro no sistema: '+((e.reason&&e.reason.message)||e.reason||'falha inesperada')));
  setOnline(navigator.onLine);
  try{
    if(typeof firebase==='undefined') throw new Error('Firebase SDK não carregou. Verifique sua internet ou bloqueio do navegador.');
    if(!firebaseConfig.apiKey || firebaseConfig.apiKey==='COLE_AQUI') throw new Error('Firebase ainda não configurado no código.');
    app=firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
    auth=firebase.auth();
    rtdb=firebase.database();
    storage=firebase.storage();
    auth.languageCode='pt_BR';
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{});
    firebase.database().goOnline();
    auth.onAuthStateChanged(async user=>{
      try{
        if(user){ currentUser=user; await loadProfile(); startRealtime(); }
        else showLogin();
      }catch(e){ showFirebaseError(firebaseErrorMessage(e)); showLogin(); }
    }, e=>showFirebaseError(firebaseErrorMessage(e)));
  }catch(e){ showFirebaseError(firebaseErrorMessage(e)); }
}
function showFirebaseError(msg){ const el=document.getElementById('firebaseAlert'); if(!el)return; el.classList.remove('hidden'); el.innerText=msg; }
function showLogin(){ document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('app').classList.add('hidden'); }
function firebaseErrorMessage(e){
  const code=e?.code||''; const msg=e?.message||String(e||'Erro desconhecido');
  const map={
    'auth/invalid-credential':'E-mail ou senha incorretos. Confira os dados e tente novamente.',
    'auth/user-not-found':'Usuário não encontrado no Firebase Authentication.',
    'auth/wrong-password':'Senha incorreta.',
    'auth/invalid-email':'E-mail inválido.',
    'auth/missing-password':'Digite a senha.',
    'auth/too-many-requests':'Muitas tentativas. Aguarde alguns minutos e tente novamente.',
    'auth/network-request-failed':'Falha de internet ao conectar no Firebase.',
    'auth/unauthorized-domain':'Domínio não autorizado no Firebase Authentication. Adicione este domínio em Authentication > Settings > Authorized domains.',
    'auth/api-key-not-valid':'API Key inválida no firebaseConfig.',
    'auth/operation-not-allowed':'Login por e-mail/senha não está habilitado no Firebase Authentication.',
    'PERMISSION_DENIED':'Permissão negada no Realtime Database. Revise as regras do Firebase.'
  };
  return map[code]||map[msg]||msg;
}
async function login(){
  try{
    if(!auth) throw new Error('Firebase Auth não inicializado.');
    const email=val('email').toLowerCase(), senha=val('senha');
    if(!email) return alert('Digite o e-mail.');
    if(!senha) return alert('Digite a senha.');
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    await auth.signInWithEmailAndPassword(email,senha);
  }catch(e){ alert('Erro no login: '+firebaseErrorMessage(e)); }
}
async function resetPassword(){
  try{
    if(!auth) throw new Error('Firebase Auth não inicializado.');
    const e=val('email').toLowerCase(); if(!e) return alert('Digite o e-mail.');
    await auth.sendPasswordResetEmail(e); alert('E-mail de recuperação enviado.');
  }catch(err){ alert('Erro ao recuperar senha: '+firebaseErrorMessage(err)); }
}
async function logout(){ try{ stopLiveTracking(); if(dataRef){ dataRef.off(); dataRef=null; } await auth.signOut(); }catch(e){ showFirebaseError(firebaseErrorMessage(e)); } }
async function ensureUserProfile(){
  const base={nome:currentUser.displayName||currentUser.email,email:currentUser.email||'',role:'admin',ativo:true,criadoEm:firebase.database.ServerValue.TIMESTAMP};
  try{
    const anyUser=await rtdb.ref('users').limitToFirst(1).once('value');
    if(anyUser.exists()) base.role='tecnico';
    await rtdb.ref('users/'+currentUser.uid).set(base);
    if(base.role==='tecnico') await rtdb.ref('tecnicos/'+currentUser.uid).set(base);
    return base;
  }catch(e){ return null; }
}
async function loadProfile(){
  const snap=await rtdb.ref('users/'+currentUser.uid).once('value'); profile=snap.val();
  if(!profile){ profile=await ensureUserProfile(); }
  if(!profile){ alert('Login autenticado, mas sem permissão/perfil em /users/'+currentUser.uid+'. Crie o perfil do usuário no Realtime Database e confira as regras.'); await logout(); return; }
  if(profile.ativo===false){ alert('Usuário desativado.'); await logout(); return; }
  profile.role=profile.role||'tecnico';
  document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
  document.getElementById('userInfo').innerText=`${profile.nome||currentUser.email} • ${profile.role==='admin'?'Administrador/RH':'Técnico'}`;
  renderMenu();
  startLiveTracking();
}
function startRealtime(){
  if(dataRef) dataRef.off();
  dataRef=rtdb.ref();
  dataRef.on('value',snap=>{ const data=snap.val()||{}; state={users:data.users||{},clientes:data.clientes||{},tecnicos:data.tecnicos||{},ordens:data.ordens||{},estoque:data.estoque||{},financeiro:data.financeiro||{},cobrancas:data.cobrancas||{},fiscal:data.fiscal||{},servicos:data.servicos||{},agenda:data.agenda||{},locationHistory:data.locationHistory||{},technicianLive:data.technicianLive||{},company:data.company||{nome:'FieldPro OS',logo:''}}; renderAll(); },err=>showFirebaseError(firebaseErrorMessage(err)));
}
function setOnline(on){ const el=document.getElementById('onlineStatus'); if(!el)return; el.innerText=on?'ONLINE':'OFFLINE'; el.className='px-3 py-2 rounded-lg text-xs font-bold '+(on?'bg-emerald-700':'bg-amber-600'); }
function val(id){ return (document.getElementById(id)?.value||'').trim(); } function uid(){ return rtdb?rtdb.ref().push().key:('id_'+Date.now()+'_'+Math.random().toString(36).slice(2)); } function safe(v){ return String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); } function today(){ return new Date().toISOString().slice(0,10); } function now(){ return new Date().toTimeString().slice(0,5); } function brl(v){ return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); } function arr(o){ return Object.entries(o||{}).map(([id,v])=>({id,...v})); }
function isAdmin(){return profile?.role==='admin'} function visibleOrders(){ const a=arr(state.ordens); return isAdmin()?a:a.filter(o=>o.tecnicoUid===currentUser.uid); }

function renderMenu(){ const base=[['dashboard','Dashboard'],['os','O.S'],['clientes','Clientes'],['estoque','Produtos'],['servicos','Serviços'],['agenda','Agenda'],['financeiro','Financeiro'],['cobrancas','Cobranças'],['fiscal','Recibos'],['relatorios','Relatórios']]; if(isAdmin()){base.splice(3,0,['tecnicos','Técnicos']); base.splice(10,0,['rh','Painel RH']); base.splice(11,0,['statusos','Status O.S']); base.push(['config','Config']);} document.getElementById('menu').innerHTML=base.map(x=>`<button id="tab_${x[0]}" onclick="show('${x[0]}')" class="tab btn card py-3 px-2 font-black text-sm">${x[1]}</button>`).join(''); }
function show(id){ document.querySelectorAll('.module').forEach(x=>x.classList.add('hidden')); document.querySelectorAll('.tab').forEach(x=>x.classList.remove('tab-active')); document.getElementById(id).classList.remove('hidden'); document.getElementById('tab_'+id)?.classList.add('tab-active'); }
function renderAll(){ document.getElementById('companyTitle').innerText=state.company.nome||'FieldPro OS'; renderDashboard(); renderOS(); renderClientes(); renderTecnicos(); renderEstoque(); renderServicos(); renderAgenda(); renderFinanceiro(); renderCobrancas(); renderFiscal(); renderRH(); renderRelatorios(); renderStatusOS(); renderConfig(); if(!document.querySelector('.tab-active')) show('dashboard'); }

function renderDashboard(){
  const os=visibleOrders(), clientes=arr(state.clientes), fin=arr(state.financeiro), estoque=arr(state.estoque);
  const total=os.length, conc=os.filter(o=>o.status==='Concluído').length, pend=os.filter(o=>o.status==='Pendente').length, and=os.filter(o=>o.status==='Em andamento').length;
  const receita=fin.filter(x=>x.tipo==='receita').reduce((s,x)=>s+Number(x.valor||0),0), desp=fin.filter(x=>x.tipo==='despesa').reduce((s,x)=>s+Number(x.valor||0),0);
  const baixo=estoque.filter(i=>Number(i.qtd||0)<=Number(i.min||0)).length;
  document.getElementById('dashboard').innerHTML=`<div class="card p-5 mb-4"><div class="flex flex-wrap justify-between items-center gap-3"><div><p class="erp-chip">MicroSaaS ERP • tempo real</p><h2 class="erp-title mt-2">Central executiva da operação</h2><p class="text-sm text-slate-500">O.S, clientes, estoque, financeiro, cobranças e relatórios profissionais em PDF.</p></div><div class="erp-actions"><button onclick="exportDashboardPDF()" class="erp-btn">PDF Executivo</button><button onclick="show('relatorios')" class="erp-btn-dark">Relatórios</button></div></div></div><div class="grid md:grid-cols-4 xl:grid-cols-6 gap-3 mb-4">${stat('Total OS',total,'bg-blue-700')}${stat('Concluídas',conc,'bg-emerald-600')}${stat('Em andamento',and,'bg-amber-600')}${stat('Pendentes',pend,'bg-red-600')}${stat('Clientes',clientes.length,'bg-slate-800')}${stat('Saldo',brl(receita-desp),'bg-cyan-700')}</div><div class="grid lg:grid-cols-3 gap-4"><div class="card p-4"><h3 class="font-black text-xl mb-3">Status das O.S</h3><canvas id="chartStatus"></canvas></div><div class="card p-4"><h3 class="font-black text-xl mb-3">Financeiro</h3><canvas id="chartFinanceiroERP"></canvas></div><div class="card p-4"><h3 class="font-black text-xl mb-3">Alertas da operação</h3><div class="space-y-3"><div class="bg-slate-50 rounded-2xl p-3"><b>Estoque baixo:</b> ${baixo} item(ns)</div><div class="bg-slate-50 rounded-2xl p-3"><b>O.S em rota/andamento:</b> ${and}</div><div class="bg-slate-50 rounded-2xl p-3"><b>Receita total:</b> ${brl(receita)}</div></div></div><div class="card p-4 lg:col-span-3"><div class="flex justify-between flex-wrap gap-2 mb-3"><h3 class="font-black text-xl">Últimas OS</h3><button onclick="exportOSReportPDF()" class="erp-btn">Exportar OS PDF</button></div>${ordersTable(os.slice(-10).reverse())}</div></div>`;
  setTimeout(()=>{drawChart('chartStatus',['Concluídas','Em andamento','Pendentes'],[conc,and,pend]); drawSingleChart('chartFinanceiroERP','bar',['Receitas','Despesas'],[receita,desp]);},80);
}

function stat(t,v,c){return`<div class="card ${c} text-white p-5"><p class="text-sm opacity-90">${t}</p><b class="text-3xl">${v}</b></div>`}
function drawChart(id,labels,data){ const c=document.getElementById(id); if(!c)return; charts.forEach(x=>x.destroy()); charts=[]; charts.push(new Chart(c,{type:'doughnut',data:{labels,datasets:[{data}]},options:{plugins:{legend:{position:'bottom'}}}})); }
function drawSingleChart(id,type,labels,data){ const c=document.getElementById(id); if(!c||typeof Chart==='undefined')return; charts.push(new Chart(c,{type,data:{labels,datasets:[{data}]},options:{plugins:{legend:{display:false}},scales:type==='bar'?{y:{beginAtZero:true}}:{}}})); }

function renderOS(){ const clientes=arr(state.clientes), tecs=arr(state.tecnicos); document.getElementById('os').innerHTML=`<div class="grid xl:grid-cols-3 gap-4"><form onsubmit="saveOS(event)" class="card p-4"><h3 class="font-black text-xl mb-4">Nova Ordem de Serviço</h3>${select('osCliente','Cliente',clientes,'nome',true)}${isAdmin()?select('osTec','Técnico',tecs,'nome',true):''}<input id="osLocal" required class="w-full border rounded-xl px-3 py-3 mb-3" placeholder="Local/endereço"><div class="grid grid-cols-2 gap-2"><input id="osData" type="date" value="${today()}" required class="border rounded-xl px-3 py-3 mb-3"><input id="osHora" type="time" value="${now()}" required class="border rounded-xl px-3 py-3 mb-3"></div><select id="osStatus" class="w-full border rounded-xl px-3 py-3 mb-3"><option>Pendente</option><option>Em andamento</option><option>Concluído</option></select><textarea id="osProblema" required class="w-full border rounded-xl px-3 py-3 mb-3" rows="3" placeholder="Descreva o problema"></textarea><textarea id="osMaterial" class="w-full border rounded-xl px-3 py-3 mb-3" rows="2" placeholder="Material usado ou Não utilizado"></textarea><button type="button" onclick="captureLocation()" class="btn w-full bg-slate-800 text-white py-3 rounded-xl font-bold mb-3">Capturar localização</button><input id="osLatLng" readonly class="w-full border bg-slate-100 rounded-xl px-3 py-3 mb-3" placeholder="Latitude, Longitude"><label class="text-sm font-bold">Fotos antes/durante/final</label><input id="fotos" type="file" accept="image/*" capture="environment" multiple onchange="renderPhotoDescriptions()" class="w-full mb-2"><div id="fotoDescBox" class="mb-3"></div><label class="text-sm font-bold">Assinatura do cliente</label><canvas id="signature" class="sig mb-2"></canvas><button type="button" onclick="clearSignature()" class="btn bg-slate-100 px-3 py-2 rounded-lg mb-3">Limpar assinatura</button><button class="btn w-full bg-blue-700 text-white py-3 rounded-xl font-black">Salvar OS</button></form><div class="card p-4 xl:col-span-2 overflow-auto"><h3 class="font-black text-xl mb-3">Ordens em tempo real</h3>${ordersTable(visibleOrders().slice().reverse())}</div></div>`; setTimeout(initSignature,100); }
function renderPhotoDescriptions(){
  const box=document.getElementById('fotoDescBox'), input=document.getElementById('fotos');
  if(!box||!input)return;
  const files=Array.from(input.files||[]);

function initSignature(){ const c=document.getElementById('signature'); if(!c)return; c.width=c.offsetWidth*2; c.height=180*2; const ctx=c.getContext('2d'); ctx.lineWidth=4; ctx.lineCap='round'; signaturePad={drawing:false,canvas:c,ctx}; const pos=e=>{const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e; return{x:(t.clientX-r.left)*2,y:(t.clientY-r.top)*2}}; c.onmousedown=c.ontouchstart=e=>{e.preventDefault(); signaturePad.drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y)}; c.onmousemove=c.ontouchmove=e=>{if(!signaturePad.drawing)return; e.preventDefault(); const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke()}; c.onmouseup=c.onmouseleave=c.ontouchend=()=>signaturePad.drawing=false; }
function clearSignature(){ const c=signaturePad.canvas;if(c)signaturePad.ctx.clearRect(0,0,c.width,c.height); }
function withTimeout(promise,ms,label){
  return Promise.race([promise,new Promise((_,reject)=>setTimeout(()=>reject(new Error((label||'Operação')+' demorou demais. Verifique internet, regras do Firebase e tente novamente.')),ms))]);
}
function getSignatureData(){
  try{ const c=signaturePad.canvas; if(!c)return ''; const data=c.toDataURL('image/png'); return data.length<5000?'':data; }catch(e){ return ''; }
}
async function uploadFiles(files,osId,descriptions=[]){
  const urls=[];
  if(!storage||!files||!files.length)return urls;
  let i=0;
  for(const f of Array.from(files)){
    try{
      const meta=descriptions[i]||{};
      const cleanName=String(f.name||'foto.jpg').replace(/[^a-zA-Z0-9._-]/g,'_');
      const ref=storage.ref(`ordens/${osId}/fotos/${Date.now()}_${i+1}_${cleanName}`);
      await withTimeout(ref.put(f),30000,'Upload da foto '+(i+1));
      const url=await withTimeout(ref.getDownloadURL(),10000,'Link da foto '+(i+1));
      urls.push({url:url,nome:f.name||cleanName,descricao:meta.descricao||'',ordem:i+1,enviadoEm:Date.now()});
    }catch(e){ console.warn('Falha ao enviar foto:',e); urls.push({url:'',nome:f.name||('foto_'+(i+1)),descricao:(descriptions[i]||{}).descricao||'',ordem:i+1,erro:firebaseErrorMessage(e)}); }
    i++;
  }
  return urls;
}
async function uploadSignature(osId,signatureData){
  try{
    if(!storage||!signatureData)return '';
    const blob=await (await fetch(signatureData)).blob();
    const ref=storage.ref(`assinaturas/${osId}.png`);
    await withTimeout(ref.put(blob),20000,'Upload da assinatura');
    return await withTimeout(ref.getDownloadURL(),10000,'Link da assinatura');
  }catch(e){ console.warn('Falha ao enviar assinatura:',e); return ''; }
}
async function uploadOsAttachments(osId,files,signatureData,descriptions=[]){
  const [fotos,assinatura]=await Promise.all([uploadFiles(files,osId,descriptions),uploadSignature(osId,signatureData)]);
  const up={atualizadoEm:firebase.database.ServerValue.TIMESTAMP};
  if(fotos.length) up.fotos=fotos;
  if(assinatura) up.assinatura=assinatura;
  const anexosOk=(!files.length||fotos.some(f=>f.url)) && (!signatureData||!!assinatura);
  up.anexosStatus=anexosOk?'ok':'pendente';
  up.anexosMensagem=anexosOk?'Anexos enviados.':'Algum anexo não foi enviado. Verifique regras do Firebase Storage.';
  await withTimeout(rtdb.ref('ordens/'+osId).update(up),15000,'Atualização dos anexos da OS');
  return up;
}
async function saveOS(e){
  e.preventDefault();
  const form=e.target;
  const btn=e.submitter||form.querySelector('button[type=submit],button:not([type])');
  const oldText=btn?btn.innerText:'';
  if(btn){ btn.disabled=true; btn.innerText='Salvando...'; }
  try{
    if(!rtdb) throw new Error('Realtime Database não inicializado.');
    if(!currentUser) throw new Error('Usuário não autenticado. Faça login novamente.');

    const clienteId=val('osCliente');
    if(!clienteId) throw new Error('Selecione o cliente.');
    const cli=state.clientes[clienteId]||{};
    if(!cli.nome) throw new Error('Cliente não encontrado no banco. Atualize a página e tente novamente.');

    const tecUid=isAdmin()?val('osTec'):currentUser.uid;
    if(!tecUid) throw new Error('Selecione o técnico.');
    const tec=state.tecnicos[tecUid]||state.users[tecUid]||profile||{};

    const local=val('osLocal');
    const data=val('osData')||today();
    const hora=val('osHora')||now();
    const problema=val('osProblema');
    if(!local) throw new Error('Informe o local/endereço.');

    const osId=uid();
    if(!osId) throw new Error('Não foi possível gerar o ID da OS.');

    const files=Array.from(document.getElementById('fotos')?.files||[]);
    const fotoDescricoes=getPhotoDescriptions();
    const signatureData=getSignatureData();
    const os={
      numero:Date.now(),
      clienteId:clienteId,
      clienteNome:cli.nome||'',
      tecnicoUid:tecUid,
      tecnicoNome:tec.nome||tec.email||'Técnico',
      local:local,
      data:data,
      hora:hora,
      status:val('osStatus')||'Pendente',
      problema:problema,
      material:val('osMaterial')||'Não utilizado',
      latlng:val('osLatLng')||'',
      fotos:fotoDescricoes.map(x=>({nome:x.name,descricao:x.descricao,ordem:x.ordem,url:'',status:'aguardando_upload'})),
      assinatura:'',
      anexosStatus:(files.length||signatureData)?'enviando':'sem_anexos',
      criadoPor:currentUser.uid,
      criadoEm:firebase.database.ServerValue.TIMESTAMP,
      atualizadoEm:firebase.database.ServerValue.TIMESTAMP
    };

    await withTimeout(rtdb.ref('ordens/'+osId).set(os),15000,'Salvamento da OS');
    await Promise.allSettled([addFinanceiroFromOS(osId,os), updateLocationHistory(osId,os)]);

    if(files.length||signatureData){
      if(btn) btn.innerText='Enviando anexos...';
      try{ await uploadOsAttachments(osId,files,signatureData,fotoDescricoes); }catch(anexoErr){ console.warn('Falha nos anexos:',anexoErr); await rtdb.ref('ordens/'+osId).update({anexosStatus:'pendente',anexosMensagem:firebaseErrorMessage(anexoErr),atualizadoEm:firebase.database.ServerValue.TIMESTAMP}).catch(()=>{}); }
    }
    if(form&&typeof form.reset==='function') form.reset();
    clearSignature();
    const box=document.getElementById('fotoDescBox'); if(box) box.innerHTML='';
    alert('OS salva com sucesso. Fotos e descrições foram processadas.');
  }catch(err){
    alert('Erro ao salvar OS: '+firebaseErrorMessage(err));
  }finally{
    if(btn){ btn.disabled=false; btn.innerText=oldText||'Salvar OS'; }
  }
}

function parseLatLng(v){
  if(!v)return null;
  if(typeof v==='object' && Number.isFinite(Number(v.lat)) && Number.isFinite(Number(v.lng))) return {lat:Number(v.lat),lng:Number(v.lng)};
  const m=String(v).match(/-?\d+(?:\.\d+)?/g);
  if(!m||m.length<2)return null;
  return {lat:Number(m[0]),lng:Number(m[1])};
}
function formatDateTime(ts){
  if(!ts)return 'Sem atualização';
  try{return new Date(Number(ts)).toLocaleString('pt-BR');}catch(e){return 'Sem atualização';}
}
function liveAge(ts){
  if(!ts)return 'sem sinal';
  const min=Math.max(0,Math.floor((Date.now()-Number(ts))/60000));
  if(min<1)return 'agora';
  if(min===1)return 'há 1 min';
  if(min<60)return `há ${min} min`;
  const h=Math.floor(min/60); return h===1?'há 1 hora':`há ${h} horas`;
}

}

rm><div class="card p-4 xl:col-span-2 overflow-auto"><h3 class="font-black text-xl mb-3">Fluxo financeiro profissional</h3>${financeTable(data)}</div></div>`;

function financeTable(data){ if(!data.length)return'<p class="text-slate-500">Sem lançamentos.</p>'; return `<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-slate-100"><th class="p-2 text-left">Data</th><th class="p-2 text-left">Tipo</th><th class="p-2 text-left">Descrição</th><th class="p-2 text-left">Categoria</th><th class="p-2 text-left">Valor</th><th class="p-2 text-left">Venc.</th><th class="p-2 text-left">Status</th></tr></thead><tbody>${data.map(x=>`<tr class="border-b"><td class="p-2">${safe(x.data)}</td><td class="p-2 font-bold ${x.tipo==='receita'?'text-emerald-700':'text-red-700'}">${safe(x.tipo)}</td><td class="p-2">${safe(x.descricao)}</td><td class="p-2">${safe(x.categoria||'-')}</td><td class="p-2 font-bold">${brl(x.valor)}</td><td class="p-2">${safe(x.vencimento||'-')}</td><td class="p-2"><span class="px-2 py-1 rounded-lg text-xs font-bold ${x.status==='pago'||x.status==='recebido'||x.status==='quitado'?'bg-emerald-100 text-emerald-700':x.status==='cancelado'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'}">${safe(x.status||'aberto')}</span></td></tr>`).join('')}</tbody></table></div>`; }
async function saveFin(e){e.preventDefault(); try{ await rtdb.ref('financeiro/'+uid()).set({tipo:val('finTipo'),descricao:val('finDesc'),valor:Number(val('finValor')),data:val('finData')||today(),vencimento:val('finVenc'),status:val('finStatus')||'aberto',categoria:val('finCategoria'),formaPagamento:val('finForma'),centroCusto:val('finCentro'),observacoes:val('finObs'),criadoPor:currentUser?.uid||'',criadoEm:firebase.database.ServerValue.TIMESTAMP}); e.target.reset(); }catch(err){ alert('Erro ao salvar lançamento: '+firebaseErrorMessage(err)); }}

function isSettledStatus(s){ s=String(s||'').toLowerCase(); return ['pago','recebido','quitado','concluido','concluído'].includes(s); }
function renderCobrancas(){
  const list=arr(state.cobrancas).sort((a,b)=>String(a.vencimento||'').localeCompare(String(b.vencimento||'')));
  const hoje=today();
  const aberto=list.filter(c=>!isSettledStatus(c.status)&&c.status!=='cancelado').reduce((s,c)=>s+Number(c.valor||0),0);
  const vencidas=list.filter(c=>c.vencimento&&c.vencimento<hoje&&!isSettledStatus(c.status)&&c.status!=='cancelado');
  const hojeList=list.filter(c=>c.vencimento===hoje&&!isSettledStatus(c.status)&&c.status!=='cancelado');
  document.getElementById('cobrancas').innerHTML=`<div class="grid md:grid-cols-4 gap-3 mb-4">${stat('Total em aberto',brl(aberto),'bg-amber-600 soft-kpi')}${stat('Vencidas',vencidas.length,'bg-red-600 soft-kpi')}${stat('Vencem hoje',hojeList.length,'bg-blue-700 soft-kpi')}${stat('Recebidas',list.filter(c=>isSettledStatus(c.status)).length,'bg-emerald-600 soft-kpi')}</div><div class="grid xl:grid-cols-3 gap-4"><form onsubmit="saveCobranca(event)" class="card p-4"><h3 class="font-black text-xl mb-3"><i class="fa-solid fa-bell"></i> Nova cobrança</h3>${select('cobCliente','Cliente',arr(state.clientes),'nome',true)}<input id="cobTel" class="w-full border rounded-xl p-3 mb-2" placeholder="Telefone/WhatsApp"><input id="cobServico" required class="w-full border rounded-xl p-3 mb-2" placeholder="Serviço ou material vendido"><div class="grid grid-cols-2 gap-2"><input id="cobDataFeito" type="date" value="${today()}" class="border rounded-xl p-3 mb-2"><input id="cobVenc" type="date" required class="border rounded-xl p-3 mb-2"></div><input id="cobValor" type="number" step="0.01" class="w-full border rounded-xl p-3 mb-2" placeholder="Valor"><select id="cobStatus" class="w-full border rounded-xl p-3 mb-2"><option value="aberto">Aberto</option><option value="recebido">Recebido</option><option value="cancelado">Cancelado</option></select><textarea id="cobMsg" class="w-full border rounded-xl p-3 mb-3" rows="3" placeholder="Mensagem personalizada. Use {cliente}, {servico}, {valor}, {vencimento}"></textarea><button class="bg-blue-700 text-white rounded-xl font-black w-full py-3">Salvar cobrança</button></form><div class="card p-4 xl:col-span-2 overflow-auto"><h3 class="font-black text-xl mb-3">Cobranças e lembretes</h3>${cobrancasTable(list)}</div></div>`;
}
function cobrancasTable(list){ if(!list.length)return '<p class="text-slate-500">Sem cobranças.</p>'; const hoje=today(); return `<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-slate-100"><th class="p-2 text-left">Cliente</th><th class="p-2 text-left">Serviço</th><th class="p-2 text-left">Vencimento</th><th class="p-2 text-left">Valor</th><th class="p-2 text-left">Status</th><th class="p-2 text-left">Ações</th></tr></thead><tbody>${list.map(c=>{const atrasada=c.vencimento&&c.vencimento<hoje&&!isSettledStatus(c.status)&&c.status!=='cancelado'; return `<tr class="border-b"><td class="p-2 font-bold">${safe(c.clienteNome)}</td><td class="p-2">${safe(c.servico)}</td><td class="p-2 ${atrasada?'text-red-700 font-bold':''}">${safe(c.vencimento||'-')}</td><td class="p-2 font-bold">${brl(c.valor)}</td><td class="p-2"><span class="px-2 py-1 rounded-lg text-xs font-bold ${isSettledStatus(c.status)?'bg-emerald-100 text-emerald-700':c.status==='cancelado'?'bg-red-100 text-red-700':atrasada?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'}">${atrasada?'vencida':safe(c.status||'aberto')}</span></td><td class="p-2"><button onclick="cobrarWhats('${c.id}')" class="bg-emerald-600 text-white px-2 py-1 rounded">WhatsApp</button> <button onclick="marcarCobPaga('${c.id}')" class="bg-blue-700 text-white px-2 py-1 rounded">Recebido</button></td></tr>`}).join('')}</tbody></table></div>`; }
async function saveCobranca(e){ e.preventDefault(); try{ const cid=val('cobCliente'), cli=state.clientes[cid]||{}; const id=uid(); await rtdb.ref('cobrancas/'+id).set({clienteId:cid,clienteNome:cli.nome||'',telefone:val('cobTel')||cli.telefone||cli.tel||'',servico:val('cobServico'),dataFeito:val('cobDataFeito')||today(),vencimento:val('cobVenc'),valor:Number(val('cobValor')||0),status:val('cobStatus')||'aberto',mensagem:val('cobMsg'),criadoPor:currentUser?.uid||'',criadoEm:firebase.database.ServerValue.TIMESTAMP}); e.target.reset(); alert('Cobrança salva.'); }catch(err){ alert('Erro ao salvar cobrança: '+firebaseErrorMessage(err)); } }
function cobrarWhats(id){ const c=state.cobrancas[id]; if(!c)return; const msg=(c.mensagem||'Olá {cliente}, passando para lembrar da cobrança referente a {servico}, no valor de {valor}, com vencimento em {vencimento}.').replaceAll('{cliente}',c.clienteNome||'').replaceAll('{servico}',c.servico||'').replaceAll('{valor}',brl(c.valor)).replaceAll('{vencimento}',c.vencimento||''); window.open('https://wa.me/'+String(c.telefone||'').replace(/\D/g,'')+'?text='+encodeURIComponent(msg),'_blank'); }
async function marcarCobPaga(id){ try{ const c=state.cobrancas[id]; if(!c)return; await rtdb.ref('cobrancas/'+id).update({status:'recebido',recebidoEm:firebase.database.ServerValue.TIMESTAMP}); await rtdb.ref('financeiro/'+uid()).set({tipo:'receita',descricao:'Cobrança recebida - '+(c.servico||c.clienteNome),valor:Number(c.valor||0),data:today(),status:'recebido',categoria:'Cobrança',formaPagamento:'',cobrancaId:id,criadoEm:firebase.database.ServerValue.TIMESTAMP}); }catch(err){ alert('Erro ao marcar recebida: '+firebaseErrorMessage(err)); } }

async function fiscalPDF(id){ const x=state.fiscal[id]; if(!x)return; const el=document.createElement('div'); el.className='p-8 bg-white'; el.style.width='800px'; el.innerHTML=`${state.company.logo?`<img src="${state.company.logo}" style="max-height:80px">`:''}<h1 style="font-size:28px;font-weight:900">${safe(x.tipo)}</h1><p><b>Empresa:</b> ${safe(state.company.nome)}</p><p><b>Cliente:</b> ${safe(x.clienteNome)}</p><p><b>Data:</b> ${safe(x.data)}</p><hr><p style="font-size:18px"><b>Descrição:</b> ${safe(x.descricao)}</p><p style="font-size:24px"><b>Total:</b> ${brl(x.valor)}</p>`; document.body.appendChild(el); const canvas=await html2canvas(el,{scale:2,useCORS:true}); const {jsPDF}=window.jspdf; const pdf=new jsPDF('p','mm','a4'); const w=210,h=canvas.height*w/canvas.width; pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,w,h); pdf.save((x.tipo||'documento')+'_'+id+'.pdf'); el.remove(); }

function renderConfig(){ if(!isAdmin())return; const users=arr(state.users); document.getElementById('config').innerHTML=`<div class="grid lg:grid-cols-2 gap-4"><div class="card p-4"><h3 class="font-black text-xl mb-3">Configurações</h3><input id="cfgNome" value="${safe(state.company.nome||'')}" class="w-full border rounded-xl p-3 mb-2" placeholder="Nome da empresa"><input id="cfgLogo" value="${safe(state.company.logo||'')}" class="w-full border rounded-xl p-3 mb-2" placeholder="URL da logo"><label class="text-sm font-bold">Selecionar logo do computador</label><input id="cfgLogoFile" type="file" accept="image/*" class="w-full mb-3"><button onclick="saveCompany()" class="bg-blue-700 text-white px-4 py-3 rounded-xl font-black">Salvar empresa</button>${state.company.logo?`<div class="mt-3"><img src="${safe(state.company.logo)}" class="max-h-24 rounded-xl border p-2 bg-white"></div>`:''}</div><div class="card p-4"><h3 class="font-black text-xl mb-3">Controle de usuários</h3><p class="text-sm text-slate-500 mb-3">Crie o login no Firebase Authentication e cadastre aqui o perfil/permissão usando o UID do usuário.</p><form onsubmit="saveUserControl(event)" class="grid md:grid-cols-2 gap-2 mb-4"><input id="userUid" required class="border rounded-xl p-3" placeholder="UID Firebase"><input id="userNome" required class="border rounded-xl p-3" placeholder="Nome"><input id="userEmail" type="email" class="border rounded-xl p-3" placeholder="E-mail"><input id="userTel" class="border rounded-xl p-3" placeholder="Telefone"><select id="userRole" class="border rounded-xl p-3"><option value="tecnico">Técnico</option><option value="admin">Administrador</option></select><select id="userAtivo" class="border rounded-xl p-3"><option value="true">Ativo</option><option value="false">Bloqueado</option></select><button class="bg-blue-700 text-white rounded-xl font-black md:col-span-2 py-3">Salvar usuário</button></form>${usersTable(users)}</div><div class="card p-4 lg:col-span-2"><h3 class="font-black text-xl mb-3"><i class="fa-solid fa-database"></i> Backup profissional</h3><p class="text-sm text-slate-500 mb-3">Exporte uma cópia completa do Realtime Database carregado na tela ou restaure um backup JSON.</p><div class="grid md:grid-cols-3 gap-2"><button onclick="exportBackup()" class="bg-blue-700 text-white rounded-xl font-black py-3">Baixar backup JSON</button><input id="backupFile" type="file" accept="application/json,.json" class="border rounded-xl p-3"><button onclick="importBackup()" class="bg-amber-600 text-white rounded-xl font-black py-3">Importar backup</button></div></div></div>`; }
async function uploadCompanyLogo(){
  const file=document.getElementById('cfgLogoFile')?.files?.[0];
  if(!file)return val('cfgLogo');
  if(!storage) throw new Error('Firebase Storage não inicializado.');
  const clean=String(file.name||'logo.png').replace(/[^a-zA-Z0-9._-]/g,'_');
  const ref=storage.ref(`empresa/logo_${Date.now()}_${clean}`);
  await withTimeout(ref.put(file),30000,'Upload da logo');
  return await withTimeout(ref.getDownloadURL(),10000,'Link da logo');
}
async function saveCompany(){ try{ const logo=await uploadCompanyLogo(); await rtdb.ref('company').set({nome:val('cfgNome'),logo:logo,atualizadoEm:firebase.database.ServerValue.TIMESTAMP}); alert('Empresa salva com sucesso.'); }catch(e){ alert('Erro ao salvar empresa: '+firebaseErrorMessage(e)); } }
function usersTable(list){
  if(!list.length)return '<p class="text-slate-500">Sem usuários cadastrados.</p>';
  return `<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-slate-100"><th class="p-2 text-left">Nome</th><th class="p-2 text-left">E-mail</th><th class="p-2 text-left">Perfil</th><th class="p-2 text-left">Status</th><th class="p-2 text-left">Ações</th></tr></thead><tbody>${list.map(u=>`<tr class="border-b"><td class="p-2 font-bold">${safe(u.nome)}</td><td class="p-2">${safe(u.email)}</td><td class="p-2">${safe(u.role||'tecnico')}</td><td class="p-2"><span class="px-2 py-1 rounded-lg text-xs font-bold ${u.ativo===false?'bg-red-100 text-red-700':'bg-emerald-100 text-emerald-700'}">${u.ativo===false?'Bloqueado':'Ativo'}</span></td><td class="p-2"><button onclick="editUserControl('${u.id}')" class="bg-blue-700 text-white px-2 py-1 rounded">Editar</button> <button onclick="toggleUserActive('${u.id}')" class="bg-slate-800 text-white px-2 py-1 rounded">${u.ativo===false?'Ativar':'Bloquear'}</button></td></tr>`).join('')}</tbody></table></div>`;
}
function editUserControl(id){
  const u=state.users[id]; if(!u)return;
  document.getElementById('userUid').value=id;
  document.getElementById('userNome').value=u.nome||'';
  document.getElementById('userEmail').value=u.email||'';
  document.getElementById('userTel').value=u.telefone||'';
  document.getElementById('userRole').value=u.role||'tecnico';
  document.getElementById('userAtivo').value=String(u.ativo!==false);
}
async function saveUserControl(e){
  e.preventDefault();
  try{
    const id=val('userUid'); if(!id)return alert('Informe o UID do usuário.');
    const obj={nome:val('userNome'),email:val('userEmail'),telefone:val('userTel'),role:val('userRole'),ativo:val('userAtivo')==='true',atualizadoEm:firebase.database.ServerValue.TIMESTAMP};
    await rtdb.ref('users/'+id).update(obj);
    if(obj.role==='tecnico') await rtdb.ref('tecnicos/'+id).update(obj); else await rtdb.ref('tecnicos/'+id).remove();
    e.target.reset(); alert('Usuário salvo.');
  }catch(err){ alert('Erro ao salvar usuário: '+firebaseErrorMessage(err)); }
}
async function toggleUserActive(id){
  try{
    const u=state.users[id]; if(!u)return;
    const ativo=!(u.ativo!==false);
    await rtdb.ref('users/'+id).update({ativo,atualizadoEm:firebase.database.ServerValue.TIMESTAMP});
    if((u.role||'tecnico')==='tecnico') await rtdb.ref('tecnicos/'+id).update({ativo});
  }catch(err){ alert('Erro ao alterar usuário: '+firebaseErrorMessage(err)); }
}

function table(data,fields){ if(!data.length)return'<p class="text-slate-500">Sem dados.</p>'; return`<div class="overflow-x-auto"><table class="w-full text-sm"><tbody>${data.map(x=>`<tr class="border-b">${fields.map(f=>`<td class="p-2"><b class="text-xs text-slate-400">${f}</b><br>${safe(x[f])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`; }


function exportBackup(){ try{ const blob=new Blob([JSON.stringify({...state,exportadoEm:new Date().toISOString()},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='backup_fieldpro_'+today()+'.json'; a.click(); URL.revokeObjectURL(a.href); }catch(e){ alert('Erro ao gerar backup: '+e.message); } }
async function importBackup(){ try{ const file=document.getElementById('backupFile')?.files?.[0]; if(!file)return alert('Selecione um arquivo JSON.'); if(!confirm('Importar backup vai atualizar os dados no Firebase. Continuar?'))return; const text=await file.text(); const obj=JSON.parse(text); const allowed=['users','clientes','tecnicos','ordens','estoque','financeiro','cobrancas','fiscal','servicos','agenda','company']; const payload={}; allowed.forEach(k=>{ if(obj[k]!==undefined) payload[k]=obj[k]; }); await rtdb.ref().update(payload); alert('Backup importado com sucesso.'); }catch(e){ alert('Erro ao importar backup: '+firebaseErrorMessage(e)); } }


function brDate(d){ if(!d)return '-'; const p=String(d).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:String(d); }
function stripTags(html){ const div=document.createElement('div'); div.innerHTML=html; return div.textContent||div.innerText||''; }
function printableHeader(title,subtitle=''){
  return `<div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #0f172a;padding-bottom:14px;margin-bottom:18px;font-family:Arial"><div>${state.company.logo?`<img src="${state.company.logo}" style="max-height:70px;max-width:180px;margin-bottom:8px">`:''}<h1 style="margin:0;font-size:24px;color:#0f172a">${safe(title)}</h1><p style="margin:6px 0;color:#475569;font-size:13px">${safe(subtitle)}</p></div><div style="text-align:right;font-size:12px;color:#475569"><b>${safe(state.company.nome||'FieldPro OS')}</b><br>Emitido em ${new Date().toLocaleString('pt-BR')}</div></div>`;
}
function printableTableFromData(list,fields,labels){
  if(!list.length)return '<p style="font-family:Arial;color:#64748b">Sem dados para o período.</p>';
  return `<table style="width:100%;border-collapse:collapse;font-family:Arial;font-size:11px"><thead><tr>${labels.map(l=>`<th style="border:1px solid #cbd5e1;background:#e2e8f0;padding:7px;text-align:left">${safe(l)}</th>`).join('')}</tr></thead><tbody>${list.map(row=>`<tr>${fields.map(f=>`<td style="border:1px solid #e2e8f0;padding:7px;vertical-align:top">${safe(typeof f==='function'?f(row):row[f])}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}
async function exportHTMLToPDF(title,htmlContent,fileName){
  const el=document.createElement('div'); el.style.width='1120px'; el.style.background='#fff'; el.style.color='#0f172a'; el.style.padding='36px'; el.style.position='fixed'; el.style.left='-99999px'; el.style.top='0'; el.innerHTML=printableHeader(title)+htmlContent; document.body.appendChild(el);
  try{ const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff'}); const {jsPDF}=window.jspdf; const pdf=new jsPDF('p','mm','a4'); const pageW=210,pageH=297; const imgW=pageW; const imgH=canvas.height*imgW/canvas.width; let y=0; if(imgH<=pageH){ pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,imgW,imgH); } else { let heightLeft=imgH; let position=0; pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,position,imgW,imgH); heightLeft-=pageH; while(heightLeft>0){ position=heightLeft-imgH; pdf.addPage(); pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,position,imgW,imgH); heightLeft-=pageH; } } pdf.save((fileName||title).replace(/[^a-zA-Z0-9_-]/g,'_')+'.pdf'); }
  finally{ el.remove(); }
}
function filterOrdersForReport(){ const ini=val('rIni')||'0000-01-01', fim=val('rFim')||'9999-12-31', st=val('rStatus'), tec=val('rTec'); return visibleOrders().filter(o=>(!o.data||o.data>=ini)&&(!o.data||o.data<=fim)&&(!st||o.status===st)&&(!tec||o.tecnicoUid===tec)); }
async function exportOSReportPDF(useFilters=false){ const list=useFilters?filterOrdersForReport():visibleOrders(); const html=printableTableFromData(list,['numero','clienteNome','tecnicoNome',x=>`${brDate(x.data)} ${x.hora||''}`,'status','local','problema'],['Nº','Cliente','Técnico','Data','Status','Local','Descrição']); await exportHTMLToPDF('Relatório de Ordens de Serviço',html,'relatorio_ordens_servico'); }
async function exportClientesPDF(){ const list=arr(state.clientes); await exportHTMLToPDF('Relatório de Clientes',printableTableFromData(list,['nome','telefone','email','endereco'],['Nome','Telefone','E-mail','Endereço']),'relatorio_clientes'); }
async function exportTecnicosPDF(){ const list=arr(state.tecnicos); await exportHTMLToPDF('Relatório de Técnicos',printableTableFromData(list,['nome','email','telefone',x=>x.ativo===false?'Bloqueado':'Ativo'],['Nome','E-mail','Telefone','Status']),'relatorio_tecnicos'); }
async function exportEstoquePDF(){ const list=arr(state.estoque); const total=list.reduce((s,x)=>s+Number(x.qtd||0)*Number(x.valor||0),0); await exportHTMLToPDF('Relatório de Produtos / Estoque',`<h2 style="font-family:Arial">Valor estimado em estoque: ${brl(total)}</h2>`+printableTableFromData(list,['nome','qtd','min',x=>brl(x.valor),x=>brl(Number(x.qtd||0)*Number(x.valor||0))],['Produto','Qtd','Mínimo','Valor unit.','Total']),'relatorio_estoque'); }
async function exportServicosPDF(){ const list=arr(state.servicos); await exportHTMLToPDF('Relatório de Serviços',printableTableFromData(list,['nome',x=>brl(x.valor),'descricao'],['Serviço','Valor padrão','Descrição']),'relatorio_servicos'); }
async function exportAgendaPDF(){ const list=arr(state.agenda).sort((a,b)=>String(a.data||'').localeCompare(String(b.data||''))); await exportHTMLToPDF('Relatório de Agenda',printableTableFromData(list,[x=>brDate(x.data),'hora','titulo','clienteNome','tecnicoNome','obs'],['Data','Hora','Título','Cliente','Técnico','Observações']),'relatorio_agenda'); }
function financeiroResumo(list){ const receita=list.filter(x=>x.tipo==='receita').reduce((s,x)=>s+Number(x.valor||0),0), desp=list.filter(x=>x.tipo==='despesa').reduce((s,x)=>s+Number(x.valor||0),0), sang=list.filter(x=>String(x.tipo).toLowerCase()==='sangria').reduce((s,x)=>s+Number(x.valor||0),0); return {receita,desp,sang,saldo:receita-desp-sang}; }
async function exportFinanceiroPDF(){ const list=arr(state.financeiro).sort((a,b)=>String(b.data||'').localeCompare(String(a.data||''))); const r=financeiroResumo(list); const html=`<div style="font-family:Arial;margin-bottom:14px"><b>Receitas:</b> ${brl(r.receita)} &nbsp; <b>Despesas:</b> ${brl(r.desp)} &nbsp; <b>Sangrias:</b> ${brl(r.sang)} &nbsp; <b>Saldo:</b> ${brl(r.saldo)}</div>`+printableTableFromData(list,[x=>brDate(x.data),'tipo','categoria','descricao','forma',x=>brl(x.valor),'status'],['Data','Tipo','Categoria','Descrição','Forma','Valor','Status']); await exportHTMLToPDF('Relatório Financeiro Completo',html,'relatorio_financeiro'); }
async function exportFechamentoDiarioPDF(){ const dia=val('finFechaDia')||today(); const list=arr(state.financeiro).filter(f=>f.data===dia); const r=financeiroResumo(list); const html=`<h2 style="font-family:Arial">Fechamento do dia ${brDate(dia)}</h2><p style="font-family:Arial"><b>Receitas:</b> ${brl(r.receita)} | <b>Despesas:</b> ${brl(r.desp)} | <b>Saldo:</b> ${brl(r.saldo)}</p>`+printableTableFromData(list,[x=>brDate(x.data),'tipo','descricao',x=>brl(x.valor),'status'],['Data','Tipo','Descrição','Valor','Status']); await exportHTMLToPDF('Fechamento Diário de Caixa',html,'fechamento_diario_'+dia); }
async function exportFechamentoMensalPDF(){ const mes=today().slice(0,7); const list=arr(state.financeiro).filter(f=>String(f.data||'').startsWith(mes)); const r=financeiroResumo(list); const html=`<h2 style="font-family:Arial">Fechamento do mês ${mes}</h2><p style="font-family:Arial"><b>Receitas:</b> ${brl(r.receita)} | <b>Despesas:</b> ${brl(r.desp)} | <b>Sangrias:</b> ${brl(r.sang)} | <b>Saldo:</b> ${brl(r.saldo)}</p>`+printableTableFromData(list,[x=>brDate(x.data),'tipo','descricao',x=>brl(x.valor),'status'],['Data','Tipo','Descrição','Valor','Status']); await exportHTMLToPDF('Fechamento Mensal de Caixa',html,'fechamento_mensal_'+mes); }
async function exportCobrancasPDF(){ const list=arr(state.cobrancas).sort((a,b)=>String(a.vencimento||'').localeCompare(String(b.vencimento||''))); await exportHTMLToPDF('Relatório de Cobranças',printableTableFromData(list,['clienteNome','telefone','servico',x=>brDate(x.dataFeito),x=>brDate(x.vencimento),x=>brl(x.valor),'status'],['Cliente','Telefone','Serviço/Material','Feito em','Vencimento','Valor','Status']),'relatorio_cobrancas'); }
async function exportFiscalPDF(){ const list=arr(state.fiscal).sort((a,b)=>String(b.data||'').localeCompare(String(a.data||''))); await exportHTMLToPDF('Relatório de Recibos e Notas',printableTableFromData(list,['tipo','clienteNome','descricao',x=>brl(x.valor),x=>brDate(x.data)],['Tipo','Cliente','Descrição','Valor','Data']),'relatorio_fiscal'); }
async function exportDashboardPDF(){ const os=visibleOrders(), fin=arr(state.financeiro), r=financeiroResumo(fin); const html=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;font-family:Arial;margin-bottom:18px"><div><b>Total OS</b><br>${os.length}</div><div><b>Concluídas</b><br>${os.filter(o=>o.status==='Concluído').length}</div><div><b>Clientes</b><br>${arr(state.clientes).length}</div><div><b>Saldo</b><br>${brl(r.saldo)}</div></div>`+printableTableFromData(os.slice(-12).reverse(),['numero','clienteNome','tecnicoNome',x=>brDate(x.data),'status'],['OS','Cliente','Técnico','Data','Status']); await exportHTMLToPDF('Dashboard Executivo',html,'dashboard_executivo'); }
async function exportAllReportsPDF(){ const html=`<h2 style="font-family:Arial">Resumo geral</h2><p style="font-family:Arial">Clientes: ${arr(state.clientes).length} | Técnicos: ${arr(state.tecnicos).length} | OS: ${visibleOrders().length} | Estoque: ${arr(state.estoque).length} | Financeiro: ${arr(state.financeiro).length}</p><h2 style="font-family:Arial">Últimas OS</h2>${printableTableFromData(visibleOrders().slice(-20).reverse(),['numero','clienteNome','tecnicoNome',x=>brDate(x.data),'status'],['OS','Cliente','Técnico','Data','Status'])}<h2 style="font-family:Arial;margin-top:20px">Financeiro</h2>${printableTableFromData(arr(state.financeiro).slice(-20).reverse(),[x=>brDate(x.data),'tipo','descricao',x=>brl(x.valor),'status'],['Data','Tipo','Descrição','Valor','Status'])}`; await exportHTMLToPDF('Relatório Geral Consolidado',html,'relatorio_geral_consolidado'); }

function setupPWA(){ const manifest={name:'FieldPro OS SaaS',short_name:'FieldPro OS',start_url:'.',display:'standalone',background_color:'#0f172a',theme_color:'#0f172a',icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="%230f172a"/><text x="82" y="310" font-size="180" fill="white" font-family="Arial" font-weight="900">OS</text></svg>',sizes:'512x512',type:'image/svg+xml'}]}; const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'}); document.getElementById('manifestLink').href=URL.createObjectURL(blob); window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;}); if('serviceWorker'in navigator){ const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>{});`; navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{}); } }
async function installPWA(){ if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; } else alert('No iPhone: toque em Compartilhar > Adicionar à Tela de Início. No Android/Chrome: menu > Instalar app.'); }
init();
</script>
