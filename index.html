<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>FieldPro OS SaaS - Firebase</title>
  <link rel="manifest" id="manifestLink">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-storage-compat.js"></script>
  <style>
    :root{--brand:#0f172a;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--amber:#d97706}
    *{box-sizing:border-box} body{background:#f1f5f9;color:#0f172a} .hidden{display:none!important}
    .card{border-radius:20px;box-shadow:0 18px 45px rgba(15,23,42,.08);background:#fff}.btn{transition:.2s}.btn:hover{transform:translateY(-1px);filter:brightness(.98)}
    input,select,textarea{outline:none}.tab-active{background:#2563eb!important;color:#fff!important}.sig{touch-action:none;background:#fff;border:1px solid #cbd5e1;border-radius:14px;width:100%;height:180px}
    @media print{.no-print{display:none!important} body{background:#fff}.card{box-shadow:none}}
  </style>
</head>
<body>
<div id="loginScreen" class="min-h-screen bg-gradient-to-br from-slate-950 via-blue-950 to-slate-900 flex items-center justify-center p-4">
  <div class="card w-full max-w-md p-7">
    <div class="text-center mb-5">
      <div class="mx-auto w-16 h-16 rounded-2xl bg-blue-700 text-white flex items-center justify-center text-3xl font-black">OS</div>
      <h1 class="text-2xl font-black mt-4">FieldPro OS SaaS</h1>
      <p class="text-sm text-slate-500">Firebase Auth + Realtime Database + Storage</p>
    </div>
    <div id="firebaseAlert" class="hidden bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl text-sm mb-3"></div>
    <label class="text-sm font-bold">E-mail</label>
    <input id="email" type="email" class="w-full border rounded-xl px-4 py-3 mb-3" placeholder="admin@empresa.com" />
    <label class="text-sm font-bold">Senha</label>
    <input id="senha" type="password" class="w-full border rounded-xl px-4 py-3 mb-4" placeholder="Sua senha" />
    <button onclick="login()" class="btn w-full bg-blue-700 text-white rounded-xl py-3 font-black">Entrar</button>
    <button onclick="resetPassword()" class="btn w-full mt-2 bg-slate-100 rounded-xl py-3 font-bold">Recuperar senha</button>
    <p class="text-xs text-slate-500 mt-4">Primeiro acesso: crie o usuário no Firebase Authentication e cadastre o perfil em /users no Realtime Database.</p>
  </div>
</div>

<div id="app" class="hidden">
  <header class="no-print sticky top-0 z-30 bg-slate-950 text-white shadow-xl">
    <div class="max-w-7xl mx-auto p-3 flex flex-wrap justify-between gap-3 items-center">
      <div><h2 class="font-black text-lg" id="companyTitle">FieldPro OS</h2><p id="userInfo" class="text-xs text-blue-200"></p></div>
      <div class="flex gap-2 flex-wrap"><span id="onlineStatus" class="px-3 py-2 rounded-lg bg-slate-800 text-xs font-bold">ONLINE</span><button onclick="installPWA()" class="btn bg-emerald-600 px-3 py-2 rounded-lg font-bold text-sm">Instalar App</button><button onclick="logout()" class="btn bg-red-600 px-3 py-2 rounded-lg font-bold text-sm">Sair</button></div>
    </div>
  </header>
  <main class="max-w-7xl mx-auto p-4">
    <nav id="menu" class="no-print grid grid-cols-2 md:grid-cols-5 lg:grid-cols-10 gap-2 mb-4"></nav>
    <section id="dashboard" class="module"></section>
    <section id="os" class="module hidden"></section>
    <section id="clientes" class="module hidden"></section>
    <section id="tecnicos" class="module hidden"></section>
    <section id="estoque" class="module hidden"></section>
    <section id="financeiro" class="module hidden"></section>
    <section id="rh" class="module hidden"></section>
    <section id="relatorios" class="module hidden"></section>
    <section id="statusos" class="module hidden"></section>
    <section id="config" class="module hidden"></section>
  </main>
</div>

<script>
'use strict';

/* COLE AQUI O SEU FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAt2TnAniXroOM3azPGV_V_E7aRppHe8ck",
  authDomain: "systemseg.firebaseapp.com",
  databaseURL: "https://systemseg-default-rtdb.firebaseio.com",
  projectId: "systemseg",
  storageBucket: "systemseg.firebasestorage.app",
  messagingSenderId: "944347398449",
  appId: "1:944347398449:web:cca015078ceadf8e89b010",
  measurementId: "G-1KEH3RN3HV"
};

let app, auth, rtdb, storage, currentUser=null, profile=null, dataRef=null, locationWatchId=null, selectedStatusOsId=null, state={users:{},clientes:{},tecnicos:{},ordens:{},estoque:{},financeiro:{},locationHistory:{},technicianLive:{},company:{nome:'FieldPro OS',logo:''}};
let charts=[], deferredPrompt=null, signaturePad={drawing:false, canvas:null, ctx:null};

function init(){
  setupPWA();
  window.addEventListener('online',()=>setOnline(true));
  window.addEventListener('offline',()=>setOnline(false));
  window.addEventListener('error',e=>showFirebaseError('Erro no sistema: '+(e.message||'erro desconhecido')));
  window.addEventListener('unhandledrejection',e=>showFirebaseError('Erro no sistema: '+((e.reason&&e.reason.message)||e.reason||'falha inesperada')));
  setOnline(navigator.onLine);
  try{
    if(typeof firebase==='undefined') throw new Error('Firebase SDK não carregou. Verifique sua internet ou bloqueio do navegador.');
    if(!firebaseConfig.apiKey || firebaseConfig.apiKey==='COLE_AQUI') throw new Error('Firebase ainda não configurado no código.');
    app=firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
    auth=firebase.auth();
    rtdb=firebase.database();
    storage=firebase.storage();
    auth.languageCode='pt_BR';
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{});
    firebase.database().goOnline();
    auth.onAuthStateChanged(async user=>{
      try{
        if(user){ currentUser=user; await loadProfile(); startRealtime(); }
        else showLogin();
      }catch(e){ showFirebaseError(firebaseErrorMessage(e)); showLogin(); }
    }, e=>showFirebaseError(firebaseErrorMessage(e)));
  }catch(e){ showFirebaseError(firebaseErrorMessage(e)); }
}
function showFirebaseError(msg){ const el=document.getElementById('firebaseAlert'); if(!el)return; el.classList.remove('hidden'); el.innerText=msg; }
function showLogin(){ document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('app').classList.add('hidden'); }
function firebaseErrorMessage(e){
  const code=e?.code||''; const msg=e?.message||String(e||'Erro desconhecido');
  const map={
    'auth/invalid-credential':'E-mail ou senha incorretos. Confira os dados e tente novamente.',
    'auth/user-not-found':'Usuário não encontrado no Firebase Authentication.',
    'auth/wrong-password':'Senha incorreta.',
    'auth/invalid-email':'E-mail inválido.',
    'auth/missing-password':'Digite a senha.',
    'auth/too-many-requests':'Muitas tentativas. Aguarde alguns minutos e tente novamente.',
    'auth/network-request-failed':'Falha de internet ao conectar no Firebase.',
    'auth/unauthorized-domain':'Domínio não autorizado no Firebase Authentication. Adicione este domínio em Authentication > Settings > Authorized domains.',
    'auth/api-key-not-valid':'API Key inválida no firebaseConfig.',
    'auth/operation-not-allowed':'Login por e-mail/senha não está habilitado no Firebase Authentication.',
    'PERMISSION_DENIED':'Permissão negada no Realtime Database. Revise as regras do Firebase.'
  };
  return map[code]||map[msg]||msg;
}
async function login(){
  try{
    if(!auth) throw new Error('Firebase Auth não inicializado.');
    const email=val('email').toLowerCase(), senha=val('senha');
    if(!email) return alert('Digite o e-mail.');
    if(!senha) return alert('Digite a senha.');
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    await auth.signInWithEmailAndPassword(email,senha);
  }catch(e){ alert('Erro no login: '+firebaseErrorMessage(e)); }
}
async function resetPassword(){
  try{
    if(!auth) throw new Error('Firebase Auth não inicializado.');
    const e=val('email').toLowerCase(); if(!e) return alert('Digite o e-mail.');
    await auth.sendPasswordResetEmail(e); alert('E-mail de recuperação enviado.');
  }catch(err){ alert('Erro ao recuperar senha: '+firebaseErrorMessage(err)); }
}
async function logout(){ try{ stopLiveTracking(); if(dataRef){ dataRef.off(); dataRef=null; } await auth.signOut(); }catch(e){ showFirebaseError(firebaseErrorMessage(e)); } }
async function ensureUserProfile(){
  const base={nome:currentUser.displayName||currentUser.email,email:currentUser.email||'',role:'admin',ativo:true,criadoEm:firebase.database.ServerValue.TIMESTAMP};
  try{
    const anyUser=await rtdb.ref('users').limitToFirst(1).once('value');
    if(anyUser.exists()) base.role='tecnico';
    await rtdb.ref('users/'+currentUser.uid).set(base);
    if(base.role==='tecnico') await rtdb.ref('tecnicos/'+currentUser.uid).set(base);
    return base;
  }catch(e){ return null; }
}
async function loadProfile(){
  const snap=await rtdb.ref('users/'+currentUser.uid).once('value'); profile=snap.val();
  if(!profile){ profile=await ensureUserProfile(); }
  if(!profile){ alert('Login autenticado, mas sem permissão/perfil em /users/'+currentUser.uid+'. Crie o perfil do usuário no Realtime Database e confira as regras.'); await logout(); return; }
  if(profile.ativo===false){ alert('Usuário desativado.'); await logout(); return; }
  profile.role=profile.role||'tecnico';
  document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
  document.getElementById('userInfo').innerText=`${profile.nome||currentUser.email} • ${profile.role==='admin'?'Administrador/RH':'Técnico'}`;
  renderMenu();
  startLiveTracking();
}
function startRealtime(){
  if(dataRef) dataRef.off();
  dataRef=rtdb.ref();
  dataRef.on('value',snap=>{ const data=snap.val()||{}; state={users:data.users||{},clientes:data.clientes||{},tecnicos:data.tecnicos||{},ordens:data.ordens||{},estoque:data.estoque||{},financeiro:data.financeiro||{},locationHistory:data.locationHistory||{},technicianLive:data.technicianLive||{},company:data.company||{nome:'FieldPro OS',logo:''}}; renderAll(); },err=>showFirebaseError(firebaseErrorMessage(err)));
}
function setOnline(on){ const el=document.getElementById('onlineStatus'); if(!el)return; el.innerText=on?'ONLINE':'OFFLINE'; el.className='px-3 py-2 rounded-lg text-xs font-bold '+(on?'bg-emerald-700':'bg-amber-600'); }
function val(id){ return (document.getElementById(id)?.value||'').trim(); } function uid(){ return rtdb?rtdb.ref().push().key:('id_'+Date.now()+'_'+Math.random().toString(36).slice(2)); } function safe(v){ return String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); } function today(){ return new Date().toISOString().slice(0,10); } function now(){ return new Date().toTimeString().slice(0,5); } function brl(v){ return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); } function arr(o){ return Object.entries(o||{}).map(([id,v])=>({id,...v})); }
function isAdmin(){return profile?.role==='admin'} function visibleOrders(){ const a=arr(state.ordens); return isAdmin()?a:a.filter(o=>o.tecnicoUid===currentUser.uid); }

function renderMenu(){ const base=[['dashboard','Dashboard'],['os','OS'],['clientes','Clientes'],['estoque','Estoque'],['financeiro','Financeiro'],['relatorios','Relatórios']]; if(isAdmin()){base.splice(3,0,['tecnicos','Técnicos']); base.splice(7,0,['rh','Painel RH']); base.splice(8,0,['statusos','Status O.S']); base.push(['config','Config']);} document.getElementById('menu').innerHTML=base.map(x=>`<button id="tab_${x[0]}" onclick="show('${x[0]}')" class="tab btn card py-3 px-2 font-black text-sm">${x[1]}</button>`).join(''); }
function show(id){ document.querySelectorAll('.module').forEach(x=>x.classList.add('hidden')); document.querySelectorAll('.tab').forEach(x=>x.classList.remove('tab-active')); document.getElementById(id).classList.remove('hidden'); document.getElementById('tab_'+id)?.classList.add('tab-active'); }
function renderAll(){ document.getElementById('companyTitle').innerText=state.company.nome||'FieldPro OS'; renderDashboard(); renderOS(); renderClientes(); renderTecnicos(); renderEstoque(); renderFinanceiro(); renderRH(); renderRelatorios(); renderStatusOS(); renderConfig(); if(!document.querySelector('.tab-active')) show('dashboard'); }

function renderDashboard(){ const os=visibleOrders(), total=os.length, conc=os.filter(o=>o.status==='Concluído').length, pend=os.filter(o=>o.status==='Pendente').length, and=os.filter(o=>o.status==='Em andamento').length; document.getElementById('dashboard').innerHTML=`<div class="grid md:grid-cols-4 gap-3 mb-4">${stat('Total OS',total,'bg-blue-700')}${stat('Concluídas',conc,'bg-emerald-600')}${stat('Em andamento',and,'bg-amber-600')}${stat('Pendentes',pend,'bg-red-600')}</div><div class="grid lg:grid-cols-2 gap-4"><div class="card p-4"><h3 class="font-black text-xl mb-3">Gráfico por situação</h3><canvas id="chartStatus"></canvas></div><div class="card p-4"><h3 class="font-black text-xl mb-3">Últimas OS</h3>${ordersTable(os.slice(-8).reverse())}</div></div>`; setTimeout(()=>drawChart('chartStatus',['Concluídas','Em andamento','Pendentes'],[conc,and,pend]),50); }
function stat(t,v,c){return`<div class="card ${c} text-white p-5"><p class="text-sm opacity-90">${t}</p><b class="text-3xl">${v}</b></div>`}
function drawChart(id,labels,data){ const c=document.getElementById(id); if(!c)return; charts.forEach(x=>x.destroy()); charts=[]; charts.push(new Chart(c,{type:'doughnut',data:{labels,datasets:[{data}]},options:{plugins:{legend:{position:'bottom'}}}})); }

function renderOS(){ const clientes=arr(state.clientes), tecs=arr(state.tecnicos); document.getElementById('os').innerHTML=`<div class="grid xl:grid-cols-3 gap-4"><form onsubmit="saveOS(event)" class="card p-4"><h3 class="font-black text-xl mb-4">Nova Ordem de Serviço</h3>${select('osCliente','Cliente',clientes,'nome',true)}${isAdmin()?select('osTec','Técnico',tecs,'nome',true):''}<input id="osLocal" required class="w-full border rounded-xl px-3 py-3 mb-3" placeholder="Local/endereço"><div class="grid grid-cols-2 gap-2"><input id="osData" type="date" value="${today()}" required class="border rounded-xl px-3 py-3 mb-3"><input id="osHora" type="time" value="${now()}" required class="border rounded-xl px-3 py-3 mb-3"></div><select id="osStatus" class="w-full border rounded-xl px-3 py-3 mb-3"><option>Pendente</option><option>Em andamento</option><option>Concluído</option></select><textarea id="osProblema" required class="w-full border rounded-xl px-3 py-3 mb-3" rows="3" placeholder="Descreva o problema"></textarea><textarea id="osMaterial" class="w-full border rounded-xl px-3 py-3 mb-3" rows="2" placeholder="Material usado ou Não utilizado"></textarea><button type="button" onclick="captureLocation()" class="btn w-full bg-slate-800 text-white py-3 rounded-xl font-bold mb-3">Capturar localização</button><input id="osLatLng" readonly class="w-full border bg-slate-100 rounded-xl px-3 py-3 mb-3" placeholder="Latitude, Longitude"><label class="text-sm font-bold">Fotos antes/durante/final</label><input id="fotos" type="file" accept="image/*" capture="environment" multiple class="w-full mb-3"><label class="text-sm font-bold">Assinatura do cliente</label><canvas id="signature" class="sig mb-2"></canvas><button type="button" onclick="clearSignature()" class="btn bg-slate-100 px-3 py-2 rounded-lg mb-3">Limpar assinatura</button><button class="btn w-full bg-blue-700 text-white py-3 rounded-xl font-black">Salvar OS</button></form><div class="card p-4 xl:col-span-2 overflow-auto"><h3 class="font-black text-xl mb-3">Ordens em tempo real</h3>${ordersTable(visibleOrders().slice().reverse())}</div></div>`; setTimeout(initSignature,100); }
function select(id,label,data,field,required){ return `<label class="text-sm font-bold">${label}</label><select id="${id}" ${required?'required':''} class="w-full border rounded-xl px-3 py-3 mb-3"><option value="">Selecione</option>${data.map(x=>`<option value="${x.id}">${safe(x[field])}</option>`).join('')}</select>`; }
function captureLocation(){ if(!navigator.geolocation)return alert('Geolocalização não suportada.'); navigator.geolocation.getCurrentPosition(p=>{document.getElementById('osLatLng').value=`${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`},e=>alert(e.message),{enableHighAccuracy:true,timeout:10000}); }
function initSignature(){ const c=document.getElementById('signature'); if(!c)return; c.width=c.offsetWidth*2; c.height=180*2; const ctx=c.getContext('2d'); ctx.lineWidth=4; ctx.lineCap='round'; signaturePad={drawing:false,canvas:c,ctx}; const pos=e=>{const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e; return{x:(t.clientX-r.left)*2,y:(t.clientY-r.top)*2}}; c.onmousedown=c.ontouchstart=e=>{e.preventDefault(); signaturePad.drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y)}; c.onmousemove=c.ontouchmove=e=>{if(!signaturePad.drawing)return; e.preventDefault(); const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke()}; c.onmouseup=c.onmouseleave=c.ontouchend=()=>signaturePad.drawing=false; }
function clearSignature(){ const c=signaturePad.canvas;if(c)signaturePad.ctx.clearRect(0,0,c.width,c.height); }
async function uploadFiles(files,osId){ const urls=[]; if(!files||!files.length)return urls; for(const f of files){ try{ const cleanName=String(f.name||'foto.jpg').replace(/[^a-zA-Z0-9._-]/g,'_'); const ref=storage.ref(`ordens/${osId}/${Date.now()}_${cleanName}`); await ref.put(f); urls.push(await ref.getDownloadURL()); }catch(e){ console.warn('Falha ao enviar foto:',e); } } return urls; }
async function uploadSignature(osId){ try{ const c=signaturePad.canvas; if(!c)return ''; const data=c.toDataURL('image/png'); if(data.length<5000)return ''; const blob=await (await fetch(data)).blob(); const ref=storage.ref(`assinaturas/${osId}.png`); await ref.put(blob); return await ref.getDownloadURL(); }catch(e){ console.warn('Falha ao enviar assinatura:',e); return ''; } }
async function saveOS(e){
  e.preventDefault();
  try{
    const clienteId=val('osCliente'); if(!clienteId) return alert('Selecione o cliente.');
    const cli=state.clientes[clienteId];
    const tecUid=isAdmin()?val('osTec'):currentUser.uid; if(!tecUid) return alert('Selecione o técnico.');
    const tec=state.tecnicos[tecUid]||state.users[tecUid]||profile;
    const osId=uid();
    const fotos=await uploadFiles(document.getElementById('fotos')?.files,osId);
    const assinatura=await uploadSignature(osId);
    const os={numero:Date.now(),clienteId,clienteNome:cli?.nome||'',tecnicoUid:tecUid,tecnicoNome:tec?.nome||'',local:val('osLocal'),data:val('osData'),hora:val('osHora'),status:val('osStatus'),problema:val('osProblema'),material:val('osMaterial')||'Não utilizado',latlng:val('osLatLng'),fotos,assinatura,criadoPor:currentUser.uid,criadoEm:firebase.database.ServerValue.TIMESTAMP};
    await rtdb.ref('ordens/'+osId).set(os); await addFinanceiroFromOS(osId,os); await updateLocationHistory(osId,os);
    alert('OS salva e sincronizada.');
  }catch(err){ alert('Erro ao salvar OS: '+firebaseErrorMessage(err)); }
}
async function updateLocationHistory(osId,os){ if(!os.latlng)return; await rtdb.ref('locationHistory/'+currentUser.uid+'/'+Date.now()).set({osId,latlng:os.latlng,data:os.data,hora:os.hora}); }
async function addFinanceiroFromOS(osId,os){ await rtdb.ref('financeiro/'+uid()).set({tipo:'receita',descricao:'OS '+os.numero+' - '+os.clienteNome,valor:0,data:os.data,osId,status:'aberto',criadoEm:firebase.database.ServerValue.TIMESTAMP}); }
function ordersTable(list){ if(!list.length)return'<p class="text-slate-500">Nenhuma OS.</p>'; return`<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-slate-100"><th class="p-2 text-left">Nº</th><th class="p-2 text-left">Cliente</th><th class="p-2 text-left">Técnico</th><th class="p-2 text-left">Data</th><th class="p-2 text-left">Status</th><th class="p-2 no-print">Ações</th></tr></thead><tbody>${list.map(o=>`<tr class="border-b"><td class="p-2 font-bold">${o.numero}</td><td class="p-2">${safe(o.clienteNome)}</td><td class="p-2">${safe(o.tecnicoNome)}</td><td class="p-2">${safe(o.data)} ${safe(o.hora)}</td><td class="p-2"><span class="px-2 py-1 rounded-lg text-xs font-bold ${o.status==='Concluído'?'bg-emerald-100 text-emerald-700':o.status==='Em andamento'?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700'}">${safe(o.status)}</span></td><td class="p-2 no-print"><button onclick="viewOS('${o.id}')" class="bg-blue-700 text-white px-2 py-1 rounded">PDF</button> <button onclick="whatsOS('${o.id}')" class="bg-emerald-600 text-white px-2 py-1 rounded">WhatsApp</button></td></tr>`).join('')}</tbody></table></div>`; }
function whatsOS(id){ const o=state.ordens[id]; const msg=`Olá! A OS ${o.numero} do cliente ${o.clienteNome} foi atualizada para: ${o.status}. Técnico: ${o.tecnicoNome}.`; window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'); }

function parseLatLng(v){
  if(!v)return null;
  if(typeof v==='object' && Number.isFinite(Number(v.lat)) && Number.isFinite(Number(v.lng))) return {lat:Number(v.lat),lng:Number(v.lng)};
  const m=String(v).match(/-?\d+(?:\.\d+)?/g);
  if(!m||m.length<2)return null;
  return {lat:Number(m[0]),lng:Number(m[1])};
}
function formatDateTime(ts){
  if(!ts)return 'Sem atualização';
  try{return new Date(Number(ts)).toLocaleString('pt-BR');}catch(e){return 'Sem atualização';}
}
function liveAge(ts){
  if(!ts)return 'sem sinal';
  const min=Math.max(0,Math.floor((Date.now()-Number(ts))/60000));
  if(min<1)return 'agora';
  if(min===1)return 'há 1 min';
  if(min<60)return `há ${min} min`;
  const h=Math.floor(min/60); return h===1?'há 1 hora':`há ${h} horas`;
}
function mapIframe(coords){
  if(!coords)return '<div class="w-full h-96 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-500 font-bold">Aguardando localização do técnico</div>';
  const q=encodeURIComponent(`${coords.lat},${coords.lng}`);
  return `<iframe class="w-full h-96 rounded-2xl border" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://maps.google.com/maps?q=${q}&z=16&output=embed"></iframe>`;
}
function trackingStep(label,active,done){
  const cls=done?'bg-emerald-600 text-white':active?'bg-amber-500 text-white':'bg-slate-200 text-slate-600';
  return `<div class="flex items-center gap-2"><span class="w-8 h-8 rounded-full ${cls} flex items-center justify-center font-black text-xs">✓</span><span class="font-bold text-sm">${label}</span></div>`;
}
function renderStatusOS(){
  if(!isAdmin())return;
  const list=arr(state.ordens).sort((a,b)=>(b.numero||0)-(a.numero||0));
  if(!selectedStatusOsId && list.length) selectedStatusOsId=list[0].id;
  const selected=state.ordens[selectedStatusOsId]||list[0];
  if(selected && !selectedStatusOsId) selectedStatusOsId=selected.id;
  let html=`<div class="grid xl:grid-cols-3 gap-4"><div class="card p-4"><h3 class="font-black text-xl mb-3">Status da O.S</h3><p class="text-sm text-slate-500 mb-3">Acompanhe a posição em tempo real do técnico responsável, parecido com rastreio de entrega.</p><select id="statusOsSelect" onchange="setStatusOS(this.value)" class="w-full border rounded-xl px-3 py-3 mb-3"><option value="">Selecione a OS</option>${list.map(o=>`<option value="${o.id}" ${selected&&selected.id===o.id?'selected':''}>OS ${safe(o.numero)} - ${safe(o.clienteNome)} - ${safe(o.status)}</option>`).join('')}</select>${ordersTable(list.slice(0,8))}</div>`;
  if(!selected){ document.getElementById('statusos').innerHTML=html+`<div class="card p-4 xl:col-span-2"><p class="text-slate-500">Nenhuma OS cadastrada.</p></div></div>`; return; }
  const live=state.technicianLive[selected.tecnicoUid]||{};
  const coords=parseLatLng(live.latlng)||parseLatLng(selected.latlng);
  const maps=coords?`https://www.google.com/maps?q=${coords.lat},${coords.lng}`:'#';
  html+=`<div class="card p-4 xl:col-span-2"><div class="flex flex-wrap justify-between gap-2 mb-3"><div><h3 class="font-black text-xl">OS ${safe(selected.numero)} • ${safe(selected.clienteNome)}</h3><p class="text-sm text-slate-500">Técnico: ${safe(selected.tecnicoNome||'Não informado')} • Último sinal: ${safe(liveAge(live.atualizadoEm))}</p></div><a href="${maps}" target="_blank" class="btn bg-blue-700 text-white px-4 py-3 rounded-xl font-black">Abrir no Maps</a></div><div class="grid md:grid-cols-4 gap-3 mb-4">${stat('Status',safe(selected.status||'Pendente'),'bg-blue-700')}${stat('Técnico',safe(selected.tecnicoNome||'-'),'bg-slate-800')}${stat('Última atualização',safe(liveAge(live.atualizadoEm)),'bg-emerald-600')}${stat('Precisão',live.accuracy?Math.round(live.accuracy)+' m':'-','bg-amber-600')}</div><div class="grid md:grid-cols-4 gap-3 mb-4">${trackingStep('OS criada',true,true)}${trackingStep('Técnico em rota',selected.status==='Em andamento',selected.status==='Em andamento'||selected.status==='Concluído')}${trackingStep('Atendimento',selected.status==='Em andamento',selected.status==='Concluído')}${trackingStep('Concluída',selected.status==='Concluído',selected.status==='Concluído')}</div>${mapIframe(coords)}<div class="mt-4 grid md:grid-cols-2 gap-3"><div class="bg-slate-50 rounded-2xl p-4"><b>Endereço da OS</b><p class="text-sm text-slate-600">${safe(selected.local||'Não informado')}</p></div><div class="bg-slate-50 rounded-2xl p-4"><b>Coordenadas atuais</b><p class="text-sm text-slate-600">${coords?`${coords.lat.toFixed(6)}, ${coords.lng.toFixed(6)}`:'Aguardando permissão de localização do técnico'}</p><p class="text-xs text-slate-400 mt-1">Atualizado em: ${safe(formatDateTime(live.atualizadoEm))}</p></div></div></div></div>`;
  document.getElementById('statusos').innerHTML=html;
}
function setStatusOS(id){ selectedStatusOsId=id; renderStatusOS(); }
function startLiveTracking(){
  if(!currentUser || !profile || profile.role==='admin' || !navigator.geolocation || locationWatchId!==null)return;
  locationWatchId=navigator.geolocation.watchPosition(async p=>{
    try{
      const payload={uid:currentUser.uid,nome:profile.nome||currentUser.email,email:currentUser.email||profile.email||'',lat:p.coords.latitude,lng:p.coords.longitude,latlng:`${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`,accuracy:p.coords.accuracy||0,atualizadoEm:firebase.database.ServerValue.TIMESTAMP};
      await rtdb.ref('technicianLive/'+currentUser.uid).set(payload);
      await rtdb.ref('locationHistory/'+currentUser.uid+'/'+Date.now()).set(payload);
    }catch(e){ console.warn('Falha ao atualizar localização em tempo real:',e); }
  }, e=>console.warn('Localização em tempo real negada/indisponível:',e.message), {enableHighAccuracy:true,maximumAge:15000,timeout:20000});
}
function stopLiveTracking(){ if(locationWatchId!==null && navigator.geolocation){ navigator.geolocation.clearWatch(locationWatchId); locationWatchId=null; } }

function renderRelatorios(){ document.getElementById('relatorios').innerHTML=`<div class="card p-4"><h3 class="font-black text-xl mb-3">Relatórios</h3><div class="grid md:grid-cols-4 gap-2 mb-4"><input id="rIni" type="date" value="${today()}" class="border rounded-xl p-3"><input id="rFim" type="date" value="${today()}" class="border rounded-xl p-3"><select id="rStatus" class="border rounded-xl p-3"><option value="">Todos</option><option>Pendente</option><option>Em andamento</option><option>Concluído</option></select><button onclick="reportPDF()" class="bg-blue-700 text-white rounded-xl font-black">Gerar PDF</button></div><div id="reportBox">${ordersTable(visibleOrders())}</div></div>`; }

function renderConfig(){ if(!isAdmin())return; const users=arr(state.users); document.getElementById('config').innerHTML=`<div class="grid lg:grid-cols-2 gap-4"><div class="card p-4"><h3 class="font-black text-xl mb-3">Configurações</h3><input id="cfgNome" value="${safe(state.company.nome||'')}" class="w-full border rounded-xl p-3 mb-2" placeholder="Nome da empresa"><input id="cfgLogo" value="${safe(state.company.logo||'')}" class="w-full border rounded-xl p-3 mb-3" placeholder="URL da logo"><button onclick="saveCompany()" class="bg-blue-700 text-white px-4 py-3 rounded-xl font-black">Salvar empresa</button></div><div class="card p-4"><h3 class="font-black text-xl mb-3">Controle de usuários</h3><p class="text-sm text-slate-500 mb-3">Crie o login no Firebase Authentication e cadastre aqui o perfil/permissão usando o UID do usuário.</p><form onsubmit="saveUserControl(event)" class="grid md:grid-cols-2 gap-2 mb-4"><input id="userUid" required class="border rounded-xl p-3" placeholder="UID Firebase"><input id="userNome" required class="border rounded-xl p-3" placeholder="Nome"><input id="userEmail" type="email" class="border rounded-xl p-3" placeholder="E-mail"><input id="userTel" class="border rounded-xl p-3" placeholder="Telefone"><select id="userRole" class="border rounded-xl p-3"><option value="tecnico">Técnico</option><option value="admin">Administrador</option></select><select id="userAtivo" class="border rounded-xl p-3"><option value="true">Ativo</option><option value="false">Bloqueado</option></select><button class="bg-blue-700 text-white rounded-xl font-black md:col-span-2 py-3">Salvar usuário</button></form>${usersTable(users)}</div></div>`; }
function usersTable(list){
  if(!list.length)return '<p class="text-slate-500">Sem usuários cadastrados.</p>';
  return `<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-slate-100"><th class="p-2 text-left">Nome</th><th class="p-2 text-left">E-mail</th><th class="p-2 text-left">Perfil</th><th class="p-2 text-left">Status</th><th class="p-2 text-left">Ações</th></tr></thead><tbody>${list.map(u=>`<tr class="border-b"><td class="p-2 font-bold">${safe(u.nome)}</td><td class="p-2">${safe(u.email)}</td><td class="p-2">${safe(u.role||'tecnico')}</td><td class="p-2"><span class="px-2 py-1 rounded-lg text-xs font-bold ${u.ativo===false?'bg-red-100 text-red-700':'bg-emerald-100 text-emerald-700'}">${u.ativo===false?'Bloqueado':'Ativo'}</span></td><td class="p-2"><button onclick="editUserControl('${u.id}')" class="bg-blue-700 text-white px-2 py-1 rounded">Editar</button> <button onclick="toggleUserActive('${u.id}')" class="bg-slate-800 text-white px-2 py-1 rounded">${u.ativo===false?'Ativar':'Bloquear'}</button></td></tr>`).join('')}</tbody></table></div>`;
}
function editUserControl(id){
  const u=state.users[id]; if(!u)return;
  document.getElementById('userUid').value=id;
  document.getElementById('userNome').value=u.nome||'';
  document.getElementById('userEmail').value=u.email||'';
  document.getElementById('userTel').value=u.telefone||'';
  document.getElementById('userRole').value=u.role||'tecnico';
  document.getElementById('userAtivo').value=String(u.ativo!==false);
}
async function saveUserControl(e){
  e.preventDefault();
  try{
    const id=val('userUid'); if(!id)return alert('Informe o UID do usuário.');
    const obj={nome:val('userNome'),email:val('userEmail'),telefone:val('userTel'),role:val('userRole'),ativo:val('userAtivo')==='true',atualizadoEm:firebase.database.ServerValue.TIMESTAMP};
    await rtdb.ref('users/'+id).update(obj);
    if(obj.role==='tecnico') await rtdb.ref('tecnicos/'+id).update(obj); else await rtdb.ref('tecnicos/'+id).remove();
    e.target.reset(); alert('Usuário salvo.');
  }catch(err){ alert('Erro ao salvar usuário: '+firebaseErrorMessage(err)); }
}
async function toggleUserActive(id){
  try{
    const u=state.users[id]; if(!u)return;
    const ativo=!(u.ativo!==false);
    await rtdb.ref('users/'+id).update({ativo,atualizadoEm:firebase.database.ServerValue.TIMESTAMP});
    if((u.role||'tecnico')==='tecnico') await rtdb.ref('tecnicos/'+id).update({ativo});
  }catch(err){ alert('Erro ao alterar usuário: '+firebaseErrorMessage(err)); }
}
